<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Notes</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 16px;
      width: 250px;
    }
    textarea {
      width: 100%;
      height: 100px;
      resize: vertical;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 1em;
    }
    #status {
      margin-top: 8px;
      color: #4caf50;
      font-size: 0.9em;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <textarea id="note" placeholder="Type your note here..."></textarea>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
